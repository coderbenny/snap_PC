name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG
        run: bash scripts/build_dmg.sh

      - name: Get version and DMG path
        id: meta
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          DMG="Snapit-${VERSION}.dmg"
          SHA256=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "version=$VERSION"   >> $GITHUB_OUTPUT
          echo "dmg=$DMG"           >> $GITHUB_OUTPUT
          echo "sha256=$SHA256"     >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Snapit v${{ steps.meta.outputs.version }}
          files: ${{ steps.meta.outputs.dmg }}
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION:   ${{ steps.meta.outputs.version }}
          SHA256:    ${{ steps.meta.outputs.sha256 }}
        run: |
          git clone \
            https://x-access-token:${TAP_TOKEN}@github.com/coderbenny/homebrew-tap.git \
            /tmp/homebrew-tap

          cd /tmp/homebrew-tap

          perl -i -pe 's/version "[^"]+"/version "'"$VERSION"'"/' Casks/snapit.rb
          perl -i -pe 's/sha256 "[^"]+"/sha256 "'"$SHA256"'"/'   Casks/snapit.rb

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add Casks/snapit.rb
          git commit -m "chore: snapit → v${VERSION}"
          git push

  build-windows:
    runs-on: windows-latest
    needs: build-and-release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Verify all plugin DLLs are present
        shell: pwsh
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          $required = @(
            "clipboard_watcher_plugin.dll",
            "desktop_drop_plugin.dll",
            "flutter_windows.dll",
            "tray_manager_plugin.dll",
            "window_manager_plugin.dll"
          )
          $missing = @()
          foreach ($dll in $required) {
            if (-not (Test-Path "$releaseDir\$dll")) { $missing += $dll }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing DLLs in release folder: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All required DLLs present:"
          Get-ChildItem "$releaseDir\*.dll" | Select-Object Name

      - name: Get version
        id: meta
        shell: pwsh
        run: |
          $v = (Select-String -Path pubspec.yaml -Pattern '^version:\s+(.+)').Matches[0].Groups[1].Value.Split('+')[0]
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Package as ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "Snapit-Windows-${{ steps.meta.outputs.version }}.zip"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Snapit-Windows-${{ steps.meta.outputs.version }}.zip
